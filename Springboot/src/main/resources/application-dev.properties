# Perfil de desarrollo - Configuración optimizada para desarrollo local
server.port=8081

# Base de datos PostgreSQL - Desarrollo
spring.datasource.url=jdbc:postgresql://localhost:5432/recetas
spring.datasource.username=recetas
spring.datasource.password=recetas
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA - Desarrollo
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# MongoDB - Desarrollo
spring.data.mongodb.uri=mongodb://localhost:27017/datamart
spring.data.mongodb.database=datamart

# Flyway - Desarrollo
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Logging - Desarrollo
logging.level.cl.duoc.api=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Configuración de desarrollo
spring.profiles.active=dev

# Flow payment gateway - Desarrollo (valores de prueba)
flow.api.url=https://sandbox.flow.cl/api
flow.public.key=your_dev_public_key
flow.private.key=your_dev_private_key

# Configuración de CORS para desarrollo
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:8080

# Configuración de JWT - Desarrollo
jwt.secret=ProgramacionWeb-microservicios-dev
jwt.expiration=28800000

# Configuración de paginación por defecto
app.pagination.default-size=10
app.pagination.max-size=100
