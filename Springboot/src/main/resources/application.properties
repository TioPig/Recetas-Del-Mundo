server.port=8081

# Perfil por defecto - desarrollo
spring.profiles.active=dev

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/recetas
spring.datasource.username=recetas
spring.datasource.password=recetas

# Hibernate dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Let Hibernate create/update schema on startup (minimal, for migration/testing)
spring.jpa.hibernate.ddl-auto=update

# MongoDB (datamart) - default connection URI (adjust as needed)
spring.data.mongodb.uri=mongodb://localhost:27017/datamart

# Flyway: when schema is non-empty but migrations were applied outside Flyway,
# create the schema history table and baseline to avoid startup failure.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Temporarily disable Flyway to allow application startup while we create
# a proper Flyway baseline in the database. Remove this once the schema
# history table is initialized with Flyway baseline or when migrations are
# managed through Flyway exclusively.
spring.flyway.enabled=true

# Flow payment gateway configuration (fill with your credentials/URLs)
# Example values:
# flow.api.url=https://api.flow.cl
# flow.public.key=pk_test_xxx
# flow.private.key=sk_test_xxx
flow.api.url=
flow.public.key=
flow.private.key=